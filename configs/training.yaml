# configs/training.yaml
# Central config for all training runs — consumed by pipeline/training/run.py

model:
  # Identification:    lightgbm | random_forest | xgboost | svc
  # Anomaly detection: isolation_forest | lof | one_class_svm
  type: lightgbm
  task: identification    # options: identification | anomaly_detection

lightgbm:
  num_leaves: 63
  learning_rate: 0.05
  n_estimators: 300
  min_child_samples: 20
  subsample: 0.8
  colsample_bytree: 0.8
  class_weight: balanced

isolation_forest:
  n_estimators: 200
  contamination: 0.05     # expected fraction of anomalous sessions
  max_features: 1.0

random_forest:
  n_estimators: 300
  class_weight: balanced

xgboost:
  n_estimators: 300
  max_depth: 6
  learning_rate: 0.05

svc:
  kernel: rbf
  class_weight: balanced
  probability: true       # required for predict_proba

lof:
  n_neighbors: 20
  contamination: 0.05

one_class_svm:
  kernel: rbf
  nu: 0.05

data:
  test_size: 0.15
  val_size: 0.15
  random_seed: 42
  min_sessions_per_player: 3   # drop players with too few sessions

mlflow:
  experiment_name: behaviorDNA
  tracking_uri: https://dagshub.com/Lo1s/behaviorDNA.mlflow
