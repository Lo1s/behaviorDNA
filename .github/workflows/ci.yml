name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install system dependencies
        run: sudo apt-get install -y libgomp1

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Lint (ruff)
        run: ruff check .

      - name: Format check (black)
        run: black --check .

      - name: Run tests
        # 65% floor: run() entrypoints are covered by dvc-repro, not unit tests
        run: pytest tests/ -v --cov=pipeline --cov=api --cov-report=term-missing --cov-fail-under=65

      - name: README results block is in sync with reports
        # README "Results at a glance" is generated from reports/*.json —
        # fail the build if someone changed metrics without regenerating it.
        run: python -m scripts.generate_results --check

  dvc-repro:
    runs-on: ubuntu-latest
    needs: lint-and-test
    if: github.ref == 'refs/heads/main'

    env:
      DAGSHUB_TOKEN: ${{ secrets.DAGSHUB_TOKEN }}
      DAGSHUB_USER: ${{ secrets.DAGSHUB_USER }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install system dependencies
        run: sudo apt-get install -y libgomp1

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Configure DVC remote
        if: env.DAGSHUB_TOKEN != ''
        run: |
          dvc remote modify origin --local auth basic
          dvc remote modify origin --local user "$DAGSHUB_USER"
          dvc remote modify origin --local password "$DAGSHUB_TOKEN"

      - name: Pull data
        if: env.DAGSHUB_TOKEN != ''
        run: dvc pull

      - name: Validate recordings (pre-ingestion gate)
        # Fails the build if any raw recording is malformed (bad schema, corrupt
        # event_count, too-short session) before it can poison the pipeline.
        if: env.DAGSHUB_TOKEN != ''
        run: python -m scripts.validate_recordings --dir data/raw

      - name: Reproduce pipeline
        if: env.DAGSHUB_TOKEN != ''
        run: dvc repro --force

      - name: Push results
        if: env.DAGSHUB_TOKEN != ''
        run: dvc push
