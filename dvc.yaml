stages:
  ingest:
    cmd: python -m pipeline.ingestion.run
    deps:
      - pipeline/ingestion/run.py
      - data/raw
    outs:
      - data/processed/sessions.parquet
      - data/processed/events.parquet

  features:
    cmd: python -m pipeline.features.run
    deps:
      - pipeline/features/run.py
      - data/processed/sessions.parquet
      - data/processed/events.parquet
    outs:
      - data/processed/features.parquet

  split:
    cmd: python -m pipeline.features.split
    deps:
      - pipeline/features/split.py
      - data/processed/features.parquet
      - configs/training.yaml
    outs:
      - data/splits/train.parquet
      - data/splits/val.parquet
      - data/splits/test.parquet

  train:
    cmd: python -m pipeline.training.run
    deps:
      - pipeline/training/run.py
      - data/splits/train.parquet
      - data/splits/val.parquet
      - configs/training.yaml
    outs:
      - models/model.pkl
      - models/model.onnx
    metrics:
      - reports/train_metrics.json:
          cache: false

  evaluate:
    cmd: python -m pipeline.evaluation.run
    deps:
      - pipeline/evaluation/run.py
      - models/model.pkl
      - data/splits/test.parquet
      - configs/training.yaml
    metrics:
      - reports/eval_metrics.json:
          cache: false
    plots:
      - reports/confusion_matrix.csv:
          cache: false
